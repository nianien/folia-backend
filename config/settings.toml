[database]
path = "data/frontpage.sqlite"

[freshrss]
# api_url / user / api_password 从环境变量读取(见 .env.example):
#   FRESHRSS_API_URL / FRESHRSS_USER / FRESHRSS_API_PASSWORD
# 这里只放非密钥的运行参数。
api_url = "http://localhost:8080/api/greader.php"
batch_size = 100
timeout_seconds = 30
mark_read = false

[embeddings]
# Ollama 本机 bge-m3;不可达时去重自动降级为 Jaccard。
url = "http://localhost:11434"
model = "bge-m3"
timeout_seconds = 30

[dedupe]
same_event_threshold = 0.82   # embedding 余弦阈值(主路径)
jaccard_threshold = 0.42      # 无 embedding 时的词重叠降级阈值
lookback_hours = 48

[model]
# provider options: "heuristic", "openai", "claude", "gemini", "xinapi"
provider = "heuristic"
timeout_seconds = 60
temperature = 0.2
max_output_tokens = 3000

[model.openai]
model = "gpt-4.1-mini"
api_key_env = "OPENAI_API_KEY"
endpoint = "https://api.openai.com/v1/responses"

[model.claude]
model = "claude-3-5-haiku-latest"
api_key_env = "ANTHROPIC_API_KEY"
endpoint = "https://api.anthropic.com/v1/messages"

[model.gemini]
model = "gemini-1.5-flash"
api_key_env = "GEMINI_API_KEY"
endpoint = "https://generativelanguage.googleapis.com/v1beta"

[model.xinapi]
# Use an id returned by GET https://airouter.xincache.cn/v1/models.
model = "deepseek-ai/DeepSeek-R1"
api_key_env = "XIN_API_KEY"
endpoint = "https://airouter.xincache.cn/v1/chat/completions"
