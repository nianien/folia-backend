# 源元数据映射(不再驱动拉取;订阅本身在 FreshRSS / config/freshrss/subscriptions.opml)。
#
# 每条把一个 FreshRSS feed 关联到 tier/category,供事件聚类与后续重要性排序使用。
# 匹配优先级:stream_id(形如 "feed/3",FreshRSS 导入后分配)> match(对 origin.title)。
# 未匹配的源默认 tier="unknown" / category="uncategorized"。

[[sources]]
match = "AP News"
name = "AP"
tier = "wire"
category = "international"

[[sources]]
match = "Reuters World"
name = "Reuters"
tier = "wire"
category = "international"

[[sources]]
match = "Guardian World"
name = "Guardian"
tier = "broadsheet"
category = "international"

[[sources]]
match = "BBC World"
name = "BBC"
tier = "broadsheet"
category = "international"

[[sources]]
match = "Hacker News"
name = "Hacker News"
tier = "interest"
category = "tech"

[[sources]]
match = "LatePost"
name = "晚点 LatePost"
tier = "interest"
category = "tech"
