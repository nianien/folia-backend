# 基座层(零开发,现成开源组件):
#   rsshub      给没有 RSS 的站造源(公众号/微博/晚点等)
#   fulltextrss FiveFilters Full-Text RSS,全文抽取后端
#   freshrss    订阅管理 + 拉取调度,暴露 Google Reader API;调用 fulltextrss 取全文
#
# pipeline 跑在宿主机,通过 http://localhost:8080/api/greader.php 读已经是全文的内容。
# Ollama(bge-m3 embedding)在 macOS 本机跑,不入 compose:ollama pull bge-m3。
#
# 发布层(本地容器, DB 仍用 Neon 云 Postgres, DATABASE_URL 取自 .env):
#   frontpage-api    FastAPI 只读接口(列表/检索/详情/点赞),常驻
#   frontpage-loader 一次性把宿主机 data/frontpage.json 灌进 Neon(profile=tools)
# 发布流程:
#   1) 宿主机: frontpage-pipeline export        -> data/frontpage.json
#   2) docker compose run --rm frontpage-loader -> 灌库
#   3) docker compose up -d frontpage-api       -> 暴露 http://localhost:8090

services:
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    networks:
      - frontpage_net

  fulltextrss:
    image: heussd/fivefilters-full-text-rss:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - frontpage_net

  freshrss:
    image: freshrss/freshrss:latest
    restart: unless-stopped
    depends_on:
      - rsshub
      - fulltextrss
    ports:
      - "8080:80"
    environment:
      TZ: ${TZ:-Australia/Sydney}
      # FreshRSS 内置拉取调度(分钟),错开整点
      CRON_MIN: "3,33"
    volumes:
      # 宿主机 bind-mount(不用 docker 命名卷): 数据落本地, docker 销毁不丢
      - ./data/freshrss:/var/www/FreshRSS/data
    networks:
      - frontpage_net

  frontpage-api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    networks:
      - frontpage_net

  frontpage-loader:
    build: ./backend
    profiles: ["tools"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
    volumes:
      - ./data:/data:ro
    command: ["python", "loader.py", "/data/frontpage.json"]
    networks:
      - frontpage_net

networks:
  frontpage_net:
    driver: bridge
