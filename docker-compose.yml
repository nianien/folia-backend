# rsshub: 给没有原生 RSS 的站造源(公众号/微博/晚点等)。纯 URL, 无账号。
#   自写轮询器(poller)直接抓 rsshub 的输出; 抓取/去重/全文都在 panel 应用内, 无外部服务。
# panel: 控制面板(Web 控制台 + 应用内 pipeline 循环)。启停/间隔/配置/数据源都在
#   面板里(http://localhost:8000), 配置存 SQLite。经 host.docker.internal 调宿主机
#   Ollama(ollama pull bge-m3), data/ bind-mount。

services:
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1200:1200"   # 只绑回环; poller 在 compose 网内经 rsshub:1200 访问
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    networks:
      - frontpage_net

  panel:
    build: .
    restart: unless-stopped
    depends_on:
      - rsshub
    ports:
      - "127.0.0.1:8000:8000"   # 只绑回环, 不暴露到局域网
    env_file:                   # 运行期注入 provider key 等(部署到别的机器换那台的 .env)
      - path: .env
        required: false         # 没有 .env 也能起(远程 provider 无 key 则退回规则)
    environment:                # environment 覆盖 env_file 同名项
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - ./data:/app/data        # SQLite + 导出产物落宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frontpage_net

networks:
  frontpage_net:
    driver: bridge
