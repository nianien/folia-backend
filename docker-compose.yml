# 基座层(零开发,现成开源组件):
#   rsshub      给没有 RSS 的站造源(公众号/微博/晚点等)
#   fulltextrss FiveFilters Full-Text RSS,全文抽取后端
#   freshrss    订阅管理 + 拉取调度,暴露 Google Reader API;调用 fulltextrss 取全文
#
# pipeline 服务: 容器化常驻, 每 PIPELINE_INTERVAL 秒自动跑一轮(抓取→清洗→聚合→入库)。
#   - 经 compose 网络读 FreshRSS(http://freshrss/...)
#   - 经 host.docker.internal 调宿主机 Ollama(bge-m3, 仍在本机: ollama pull bge-m3)
#   - data/ bind-mount 宿主机, SQLite 与导出产物落本地
# 手动验证仍可用宿主机: ./scripts/folia.sh run / publish。

services:
  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    networks:
      - frontpage_net

  fulltextrss:
    image: heussd/fivefilters-full-text-rss:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - frontpage_net

  freshrss:
    image: freshrss/freshrss:latest
    restart: unless-stopped
    depends_on:
      - rsshub
      - fulltextrss
    ports:
      - "8080:80"
    environment:
      TZ: ${TZ:-Australia/Sydney}
      # FreshRSS 内置拉取调度(分钟),错开整点
      CRON_MIN: "3,33"
    volumes:
      # 宿主机 bind-mount(不用 docker 命名卷): 数据落本地, docker 销毁不丢
      - ./data/freshrss:/var/www/FreshRSS/data
    networks:
      - frontpage_net

  pipeline:
    build: .
    restart: unless-stopped
    depends_on:
      - rsshub
      - fulltextrss
      - freshrss
    environment:
      # 容器内经 compose 网络读 FreshRSS(不是 localhost:8080)
      FRESHRSS_API_URL: http://freshrss/api/greader.php
      FRESHRSS_USER: ${FRESHRSS_USER:?set FRESHRSS_USER in .env}
      FRESHRSS_API_PASSWORD: ${FRESHRSS_API_PASSWORD:?set FRESHRSS_API_PASSWORD in .env}
      # 宿主机 Ollama
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      # 配了就每轮入库; 留空则只本地聚合
      DATABASE_URL: ${DATABASE_URL:-}
      PIPELINE_INTERVAL: ${PIPELINE_INTERVAL:-1800}
    volumes:
      - ./data:/app/data        # SQLite + 导出产物落宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frontpage_net

networks:
  frontpage_net:
    driver: bridge
